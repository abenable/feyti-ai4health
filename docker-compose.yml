name: feyti

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: feyti-backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    ports:
      - "8022:8000"
    networks:
      - feyti-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: feyti-frontend
    restart: unless-stopped
    ports:
      - "3200:3000"
    env_file:
      - ./frontend/.env
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - feyti-network

networks:
  feyti-network:
    driver: bridge
