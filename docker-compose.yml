name: feyti

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: feyti-backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    # No published ports: backend is reachable only on the internal network,
    # via the frontend's server-side proxy (see next.config.ts rewrites).
    expose:
      - "8000"
    networks:
      - feyti-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # Frontend proxies /api and /health to the backend service internally.
        BACKEND_INTERNAL_URL: http://backend:8000
    container_name: feyti-frontend
    restart: unless-stopped
    # Only this port is published to the host.
    ports:
      - "3200:3000"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - feyti-network

networks:
  feyti-network:
    driver: bridge
